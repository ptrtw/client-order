<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>街口支付結帳 - 清心福全</title>
    <!-- 引入 LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { 
            --brand-color: #00d26a; 
            --brand-light: #e8f5e9;
            --bg-color: #f0f2f5; 
            --text-main: #333333;
            --text-muted: #888888;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 10px; }
        h2 { margin: 0 0 10px; font-size: 1.3rem; color: var(--text-main); }
        p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
        .btn-jkos { display: block; width: 100%; padding: 14px; background: #e11d48; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(225,29,72,0.3); }
        .btn-success { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,210,106,0.3); }
        .btn-cancel { width: 100%; padding: 14px; background: #fee2e2; color: #dc2626; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .divider { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">💳</div>
    <h2>街口支付快速結帳</h2>
    <p>請點擊下方按鈕前往街口完成付款，付完後請回到此畫面點擊回報按鈕。</p>
    
    <!-- 直接用超連結導向街口，安全不被 LINE 封鎖 -->
    <a href="https://service.jkopay.com/r/transfer?j=Transfer:901462034" target="_blank" class="btn-jkos">🚀 前往街口支付 App 付款</a>
    
    <hr class="divider">
    
    <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;">👇 已經完成付款了嗎？請點擊下方按鈕通知店家：</p>
    
    <button class="btn-success" onclick="handlePaymentSuccess()">✅ 我已成功付款，通知店家</button>
    <button class="btn-cancel" onclick="handlePaymentCancel()">❌ 取消或尚未付款</button>
</div>

<script>
    const LIFF_ID = "2010718024-p1hooBDD"; 

    liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) {
            liff.login();
        }
    }).catch(err => {
        console.error("LIFF 初始化失敗", err);
    });

    // 點擊「成功付款」：發送 Flex Message 並關閉視窗
    async function handlePaymentSuccess() {
        if (!liff.isInClient()) {
            alert("✅ 已確認付款成功！(非 LINE 內嵌環境)");
            window.close();
            return;
        }

        try {
            const flexMessage = {
                type: "flex",
                altText: "🎉 客人已完成街口付款通知",
                contents: {
                    type: "bubble",
                    size: "mega",
                    header: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#00d26a",
                        paddingAll: "md",
                        contents: [
                            {
                                type: "text",
                                text: "🎉 街口付款成功通知",
                                weight: "bold",
                                size: "lg",
                                color: "#ffffff"
                            }
                        ]
                    },
                    body: {
                        type: "box",
                        layout: "vertical",
                        spacing: "md",
                        contents: [
                            {
                                type: "text",
                                text: "顧客已透過【街口支付】完成結帳，請店員協助核對並準備餐點！",
                                wrap: true,
                                size: "sm",
                                color: "#333333"
                            }
                        ]
                    }
                }
            };

            await liff.sendMessages([flexMessage]);
            alert("✅ 已成功通知店家！");
            liff.closeWindow();
        } catch (err) {
            alert("發送通知失敗：" + JSON.stringify(err));
        }
    }

    // 點擊「取消付款」：安全關閉
    function handlePaymentCancel() {
        alert("已取消付款流程。");
        if (liff.isInClient()) {
            liff.closeWindow();
        } else {
            window.close();
        }
    }
</script>

</body>
</html>
