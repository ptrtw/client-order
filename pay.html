<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>街口支付結帳 - 清心福全</title>
    <!-- 引入 LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { 
            --brand-color: #00d26a; 
            --brand-light: #e8f5e9;
            --bg-color: #f0f2f5; 
            --text-main: #333333;
            --text-muted: #888888;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 10px; }
        h2 { margin: 0 0 10px; font-size: 1.3rem; color: var(--text-main); }
        p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
        .btn-success { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,210,106,0.3); }
        .btn-cancel { width: 100%; padding: 14px; background: #fee2e2; color: #dc2626; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-link { background: none; border: none; color: #2563eb; font-size: 0.9rem; text-decoration: underline; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<!-- 預設顯示的畫面，防止空白 -->
<div class="card" id="ui-container">
    <div class="icon">💳</div>
    <h2>正在開啟街口支付...</h2>
    <p>系統已嘗試喚醒街口 App。<br>若未跳轉，請點擊下方按鈕手動前往付款。</p>
    
    <button class="btn-link" style="margin-bottom: 20px;" onclick="forceOpenJkos()">🚀 點此手動開啟街口 App</button>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
    
    <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;">👇 付款完成後，請點擊下方按鈕通知店家：</p>
    
    <button class="btn-success" onclick="handlePaymentSuccess()">✅ 我已成功付款，通知店家</button>
    <button class="btn-cancel" onclick="handlePaymentCancel()">❌ 取消或尚未付款</button>
</div>

<script>
    const LIFF_ID = "2010718024-p1hooBDD"; 
    const JKOS_PAY_URL = "https://service.jkopay.com/r/transfer?j=Transfer:901462034";

    liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }
        
        // 🔥 Pro 級絕招：呼叫 LIFF API，帶入 external: true
        // 這會強制跳出 LINE 的綁架，直接用外部系統喚醒街口 App！
        liff.openWindow({
            url: JKOS_PAY_URL,
            external: true
        });

    }).catch(err => {
        console.error("LIFF 初始化失敗", err);
    });

    // 萬一客人的手機擋下了自動開啟，提供一個手動補救按鈕
    function forceOpenJkos() {
        liff.openWindow({
            url: JKOS_PAY_URL,
            external: true
        });
    }

    // 發送成功結帳通知
    async function handlePaymentSuccess() {
        if (!liff.isInClient()) {
            alert("✅ 已確認付款成功！");
            window.close();
            return;
        }

        try {
            const flexMessage = {
                type: "flex",
                altText: "🎉 客人已完成街口付款通知",
                contents: {
                    type: "bubble",
                    size: "mega",
                    header: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#00d26a",
                        paddingAll: "md",
                        contents: [
                            { type: "text", text: "🎉 街口付款成功通知", weight: "bold", size: "lg", color: "#ffffff" }
                        ]
                    },
                    body: {
                        type: "box",
                        layout: "vertical",
                        spacing: "md",
                        contents: [
                            { type: "text", text: "顧客已透過【街口支付】完成結帳，請店員協助核對並準備餐點！", wrap: true, size: "sm", color: "#333333" }
                        ]
                    }
                }
            };

            await liff.sendMessages([flexMessage]);
            alert("✅ 已成功通知店家！");
            liff.closeWindow();
        } catch (err) {
            alert("發送通知失敗：" + JSON.stringify(err));
        }
    }

    // 取消並關閉
    function handlePaymentCancel() {
        if (liff.isInClient()) {
            liff.closeWindow();
        } else {
            window.close();
        }
    }
</script>

</body>
</html>
