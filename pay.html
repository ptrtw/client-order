<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>街口支付結帳 - 清心福全</title>
    <!-- 引入 LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { 
            --brand-color: #00d26a; 
            --brand-light: #e8f5e9;
            --bg-color: #f0f2f5; 
            --text-main: #333333;
            --text-muted: #888888;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; box-sizing: border-box; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 10px; }
        h2 { margin: 0 0 10px; font-size: 1.3rem; color: var(--text-main); }
        p { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 25px; }
        
        .step-label { font-size: 0.85rem; font-weight: bold; color: #555; text-align: left; margin-bottom: 8px; display: block; }
        .btn-jkos { width: 100%; padding: 16px; background: #e11d48; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 20px; box-shadow: 0 3px 6px rgba(225,29,72,0.3); }
        .btn-success { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,210,106,0.3); }
        .btn-cancel { width: 100%; padding: 14px; background: #fee2e2; color: #dc2626; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        
        .divider { border: 0; border-top: 2px dashed #e0e0e0; margin: 25px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">💳</div>
    <h2>街口支付快速結帳</h2>
    <p>為了確保連線穩定，請手動點擊下方按鈕前往付款。</p>
    
    <!-- 第一步：手動點擊前往街口，使用 LIFF API 確保外部開啟 -->
    <span class="step-label">1️⃣ 第一步：前往付款</span>
    <button class="btn-jkos" onclick="openJkosApp()">🚀 點此開啟街口 App</button>
    
    <hr class="divider">
    
    <!-- 第二步：留在原地的回報按鈕 -->
    <span class="step-label">2️⃣ 第二步：付款完成後點此回報</span>
    <button class="btn-success" onclick="handlePaymentSuccess()">✅ 我已成功付款，通知店家</button>
    <button class="btn-cancel" onclick="handlePaymentCancel()">⏳ 尚未付款 / 稍後再付</button>
</div>

<script>
    const LIFF_ID = "2010718024-p1hooBDD"; 
    const JKOS_PAY_URL = "https://service.jkopay.com/r/transfer?j=Transfer:901462034";

    liff.init({ liffId: LIFF_ID }).then(() => {
        if (!liff.isLoggedIn()) {
            liff.login();
        }
    }).catch(err => {
        console.error("LIFF 初始化失敗", err);
    });

    // 客人手動點擊時，才呼叫外部瀏覽器開啟街口
    function openJkosApp() {
        liff.openWindow({
            url: JKOS_PAY_URL,
            external: true
        });
    }

    // 發送成功結帳通知
    async function handlePaymentSuccess() {
        if (!liff.isInClient()) {
            alert("✅ 已確認付款成功！(非 LINE 環境)");
            window.close();
            return;
        }

        try {
            const flexMessage = {
                type: "flex",
                altText: "🎉 客人已完成街口付款通知",
                contents: {
                    type: "bubble",
                    size: "mega",
                    header: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#00d26a",
                        paddingAll: "md",
                        contents: [
                            { type: "text", text: "🎉 街口付款成功通知", weight: "bold", size: "lg", color: "#ffffff" }
                        ]
                    },
                    body: {
                        type: "box",
                        layout: "vertical",
                        spacing: "md",
                        contents: [
                            { type: "text", text: "顧客已透過【街口支付】完成結帳，請店員協助核對並準備餐點！", wrap: true, size: "sm", color: "#333333" }
                        ]
                    }
                }
            };

            await liff.sendMessages([flexMessage]);
            alert("✅ 已成功通知店家！");
            liff.closeWindow();
        } catch (err) {
            alert("發送通知失敗：" + JSON.stringify(err));
        }
    }

    // 發送等待付款通知 (橘黃色卡片)
    async function handlePaymentCancel() {
        if (!liff.isInClient()) {
            alert("已取消付款。(非 LINE 環境)");
            window.close();
            return;
        }

        try {
            const flexMessage = {
                type: "flex",
                altText: "⏳ 顧客尚未完成付款",
                contents: {
                    type: "bubble",
                    size: "mega",
                    header: {
                        type: "box",
                        layout: "vertical",
                        backgroundColor: "#f59e0b", // 橘黃色代表等待中/警告
                        paddingAll: "md",
                        contents: [
                            { type: "text", text: "⏳ 等待付款中...", weight: "bold", size: "lg", color: "#ffffff" }
                        ]
                    },
                    body: {
                        type: "box",
                        layout: "vertical",
                        spacing: "md",
                        contents: [
                            { type: "text", text: "顧客目前尚未完成街口結帳，或已暫時取消流程。請留意後續收款狀態！", wrap: true, size: "sm", color: "#333333" }
                        ]
                    }
                }
            };

            await liff.sendMessages([flexMessage]);
            alert("已發送狀態給店家！");
            liff.closeWindow();
        } catch (err) {
            alert("發送通知失敗：" + JSON.stringify(err));
        }
    }
</script>

</body>
</html>
