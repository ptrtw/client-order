<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寄杯管理系統 - 清心福全</title>
    <style>
        :root { 
            --brand-color: #00d26a; 
            --brand-light: #e8f5e9;
            --bg-color: #f0f2f5; 
            --text-main: #333333;
            --text-muted: #888888;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        
        .header { background-color: var(--brand-color); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }

        .search-bar { padding: 10px 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 48px; z-index: 99; }
        .search-bar input { width: 100%; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 0.95rem; box-sizing: border-box; outline: none; background: #f9f9f9; }
        .search-bar input:focus { border-color: var(--brand-color); background: #fff; box-shadow: 0 0 5px rgba(0,210,106,0.2); }

        /* 雙欄網格 */
        .customer-grid { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 80px; }
        
        /* 全新優化的顧客卡片 */
        .customer-card { 
            background: white; 
            border-radius: 12px; 
            padding: 12px 10px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); 
            border-left: 4px solid var(--brand-color); 
            display: flex; 
            flex-direction: column; 
        }
        
        .customer-name { font-size: 1.05rem; font-weight: bold; color: var(--text-main); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 杯數與金額合併，並設計為可點擊的樣式 (看紀錄) */
        .balance-wrap { 
            display: flex; 
            align-items: baseline; 
            gap: 8px; 
            background: #fdfdfd; 
            padding: 6px 8px; 
            border-radius: 8px; 
            border: 1px dashed #b2dfdb; 
            cursor: pointer; 
            margin-bottom: 6px;
            transition: background 0.1s;
        }
        .balance-wrap:active { background: #e0f2f1; }
        .b-cup { font-size: 1.35rem; font-weight: 900; color: var(--brand-color); }
        .b-money { font-size: 0.85rem; color: #777; font-weight: 500; }
        
        .customer-remark { font-size: 0.75rem; color: #e65100; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 底部快捷按鈕 */
        .quick-actions { display: flex; gap: 8px; margin-top: auto; }
        .q-btn { flex: 1; padding: 8px 0; border: none; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: transform 0.1s; }
        .q-btn:active { transform: scale(0.95); }
        .q-btn-take { background: #ffebee; color: #c62828; }
        .q-btn-deposit { background: #e8f5e9; color: #2e7d32; }

        .fab-add { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--brand-color); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(0,210,106,0.4); cursor: pointer; border: none; z-index: 1000; }

        /* 彈窗基本樣式 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
        .modal-content { background: #ffffff; width: 100%; max-width: 600px; padding: 20px; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        .modal-title { font-size: 1.15rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; outline: none; }
        .form-group input:focus { border-color: var(--brand-color); background: #fff; }
        .submit-btn { width: 100%; padding: 12px; background: var(--brand-color); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 5px; }
        .close-modal { background: #eee; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 1rem; cursor: pointer; color: #666; }

        /* Radio Toggle */
        .radio-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .radio-group label { flex: 1; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; cursor: pointer; background: #f9f9f9; }
        .radio-group input[type="radio"] { display: none; }
        .radio-group input[type="radio"]:checked + label { background: var(--brand-light); border-color: var(--brand-color); color: var(--brand-color); font-weight: bold; }

        /* 紀錄 */
        .log-list { max-height: 50vh; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .log-time { font-size: 0.75rem; color: #999; margin-bottom: 2px; }
        .log-action { font-weight: bold; font-size: 0.95rem; }
        .log-action.take { color: #c62828; }
        .log-action.deposit { color: #2e7d32; }
        .log-detail { font-size: 0.95rem; font-weight: bold; text-align: right; }
        .log-remark { font-size: 0.75rem; color: #666; font-weight: normal; }

        #loadingOverlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(255,255,255,0.8); z-index: 3000; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; color: var(--brand-color); display: none; }
    </style>
</head>
<body>

<div id="loadingOverlay">⏳ 資料同步中...</div>

<div class="header">
    <div>📓 寄杯管理</div>
    <button class="back-btn" onclick="window.location.href='staff.html'">回點餐</button>
</div>

<div class="search-bar">
    <input type="text" placeholder="🔍 搜尋客戶稱呼..." id="searchInput" onkeyup="filterCustomers()">
</div>

<!-- 雙欄顯示區 -->
<div class="customer-grid" id="customerList"></div>

<button class="fab-add" onclick="openAddModal()">+</button>

<!-- 拿取/寄杯 彈窗 -->
<div class="modal-overlay" id="actionModal" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-content">
        <div class="modal-title">
            <span id="actionTitle">拿取 / 寄杯</span>
            <button class="close-modal" onclick="document.getElementById('actionModal').style.display='none'">✕</button>
        </div>
        
        <div class="form-group">
            <label>異動項目</label>
            <div class="radio-group">
                <input type="radio" id="targetCup" name="targetType" value="cups" checked>
                <label for="targetCup">🥤 杯數</label>
                <input type="radio" id="targetMoney" name="targetType" value="money">
                <label for="targetMoney">💰 金額</label>
            </div>
        </div>

        <div class="form-group">
            <label>異動數量</label>
            <input type="number" id="actionAmount" placeholder="請輸入數字" inputmode="numeric">
        </div>
        <div class="form-group">
            <label>單次備註 (選填)</label>
            <input type="text" id="actionRemark" placeholder="例如：2杯梅G、補放300元...">
        </div>
        <button class="submit-btn" onclick="submitAction()">💾 確認送出</button>
    </div>
</div>

<!-- 新增客戶 彈窗 -->
<div class="modal-overlay" id="addModal" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-content">
        <div class="modal-title">
            <span>➕ 新增寄杯客戶</span>
            <button class="close-modal" onclick="document.getElementById('addModal').style.display='none'">✕</button>
        </div>
        <div class="form-group"><label>稱呼 (必填)</label><input type="text" id="addName" placeholder="例如：男哥、黃's"></div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;"><label>初始杯數</label><input type="number" id="addCups" placeholder="0" inputmode="numeric"></div>
            <div class="form-group" style="flex:1;"><label>初始金額</label><input type="number" id="addMoney" placeholder="0" inputmode="numeric"></div>
        </div>
        <div class="form-group"><label>常態備註 (選填)</label><input type="text" id="addRemark" placeholder="例如：常喝無糖高山、附袋子"></div>
        <button class="submit-btn" onclick="submitNewCustomer()">💾 新增客戶</button>
    </div>
</div>

<!-- 歷史紀錄 彈窗 -->
<div class="modal-overlay" id="logModal" onclick="if(event.target==this) this.style.display='none'">
    <div class="modal-content">
        <div class="modal-title">
            <span id="logTitle">歷史紀錄</span>
            <button class="close-modal" onclick="document.getElementById('logModal').style.display='none'">✕</button>
        </div>
        <div class="log-list" id="logListContent"></div>
    </div>
</div>

<script>
    const KEEP_CUP_API_URL = "https://script.google.com/macros/s/AKfycbwzVGw93CzqKJhqFE0BfcP4AfjCfW3HOr-8INTesvTdbwfZr6g3t5bH7LOF21JC2ySr/exec";

    let allCustomers = [];
    let currentActionData = {};

    function loadData() {
        document.getElementById('loadingOverlay').style.display = 'flex';
        fetch(KEEP_CUP_API_URL)
            .then(res => res.json())
            .then(data => {
                allCustomers = data.sort((a, b) => {
                    if (!a.lastUpdate) return 1;
                    if (!b.lastUpdate) return -1;
                    return new Date(b.lastUpdate) - new Date(a.lastUpdate);
                });
                renderCustomers(allCustomers);
                document.getElementById('loadingOverlay').style.display = 'none';
            })
            .catch(err => {
                alert("載入失敗，請檢查網路或 API 網址是否正確。");
                document.getElementById('loadingOverlay').style.display = 'none';
            });
    }

    // 渲染「直覺操作版雙欄卡片」
    function renderCustomers(list) {
        const container = document.getElementById('customerList');
        container.innerHTML = '';
        if(list.length === 0) {
            container.innerHTML = '<div style="grid-column: span 2; text-align:center; padding: 20px; color:#999;">目前沒有資料</div>';
            return;
        }

        list.forEach(c => {
            let remarkHtml = c.remark ? `<div class="customer-remark">📝 ${c.remark}</div>` : '';
            container.innerHTML += `
                <div class="customer-card">
                    <div class="customer-name">${c.name}</div>
                    
                    <!-- 點擊杯數/金額區塊即可查看歷史紀錄 -->
                    <div class="balance-wrap" onclick="openLogModal('${c.name}')" title="點擊查看紀錄">
                        <span class="b-cup">${c.cups} 杯</span>
                        <span class="b-money">$${c.money}</span>
                    </div>
                    
                    ${remarkHtml}
                    
                    <!-- 捷徑操作按鈕 -->
                    <div class="quick-actions">
                        <button class="q-btn q-btn-take" onclick="openActionModal('${c.name}', '拿取')">➖ 取</button>
                        <button class="q-btn q-btn-deposit" onclick="openActionModal('${c.name}', '寄杯')">➕ 寄</button>
                    </div>
                </div>
            `;
        });
    }

    function filterCustomers() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allCustomers.filter(c => c.name.toLowerCase().includes(keyword));
        renderCustomers(filtered);
    }

    function openActionModal(name, actionType) {
        currentActionData = { name, type: actionType };
        document.getElementById('actionTitle').innerText = `${name} - ${actionType}`;
        document.getElementById('actionAmount').value = '';
        document.getElementById('actionRemark').value = '';
        document.getElementById('actionModal').style.display = 'flex';
        setTimeout(() => document.getElementById('actionAmount').focus(), 300);
    }

    function submitAction() {
        const amount = document.getElementById('actionAmount').value;
        const remark = document.getElementById('actionRemark').value;
        const target = document.querySelector('input[name="targetType"]:checked').value;

        if (!amount || amount <= 0) return alert("請輸入正確的數量！");

        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('actionModal').style.display = 'none';

        const payload = {
            action: 'updateBalance',
            name: currentActionData.name,
            type: currentActionData.type,
            target: target,
            amount: amount,
            remark: remark
        };

        fetch(KEEP_CUP_API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            if (res.status === 'success') {
                // 不使用 alert 打斷流暢度，直接重整資料
                loadData();
            } else {
                alert("失敗：" + res.message);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }).catch(err => {
            alert("網路異常，請重試！");
            document.getElementById('loadingOverlay').style.display = 'none';
        });
    }

    function openAddModal() {
        document.getElementById('addName').value = '';
        document.getElementById('addCups').value = '';
        document.getElementById('addMoney').value = '';
        document.getElementById('addRemark').value = '';
        document.getElementById('addModal').style.display = 'flex';
    }

    function submitNewCustomer() {
        const name = document.getElementById('addName').value.trim();
        if(!name) return alert("請輸入客戶稱呼！");

        document.getElementById('loadingOverlay').style.display = 'flex';
        document.getElementById('addModal').style.display = 'none';

        const payload = {
            action: 'addCustomer',
            name: name,
            cups: document.getElementById('addCups').value || 0,
            money: document.getElementById('addMoney').value || 0,
            remark: document.getElementById('addRemark').value
        };

        fetch(KEEP_CUP_API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        }).then(res => res.json()).then(res => {
            alert("新增成功！");
            loadData();
        });
    }

    function openLogModal(name) {
        document.getElementById('logTitle').innerText = `${name} 的異動紀錄`;
        const logContent = document.getElementById('logListContent');
        logContent.innerHTML = '<div style="text-align:center; padding: 20px;">抓取紀錄中...</div>';
        document.getElementById('logModal').style.display = 'flex';

        fetch(KEEP_CUP_API_URL + `?action=getLogs&name=${name}`)
            .then(res => res.json())
            .then(logs => {
                logContent.innerHTML = '';
                if(logs.length === 0) {
                    logContent.innerHTML = '<div style="text-align:center; padding: 20px; color:#999;">尚無異動紀錄</div>';
                    return;
                }
                logs.forEach(log => {
                    let actionClass = log.type === '拿取' ? 'take' : 'deposit';
                    let actionIcon = log.type === '拿取' ? '➖' : '➕';
                    let remarkHtml = log.remark ? `<div class="log-remark">📝 ${log.remark}</div>` : '';
                    
                    logContent.innerHTML += `
                        <div class="log-item">
                            <div>
                                <div class="log-time">${log.time}</div>
                                <div class="log-action ${actionClass}">${actionIcon} ${log.type}</div>
                            </div>
                            <div class="log-detail">
                                <div>${log.amount}</div>
                                ${remarkHtml}
                            </div>
                        </div>
                    `;
                });
            });
    }

    window.onload = loadData;
</script>
</body>
</html>
