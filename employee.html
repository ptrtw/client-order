<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>品項管理 - 清心福全</title>
    <style>
        /* ===== 全域重置 & 字型 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang TC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            background: #f5f7fb;
            padding: 16px 12px 30px;
            color: #1e2a3a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            padding: 20px 16px 28px;
            transition: all 0.2s;
        }

        /* ===== 標題列 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0b2b3b;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #8899aa;
            margin-left: 4px;
        }

        .btn-add {
            background: #2d8c6f;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 8px rgba(45, 140, 111, 0.25);
            white-space: nowrap;
        }
        .btn-add:hover {
            background: #237a5f;
        }
        .btn-add:active {
            transform: scale(0.96);
        }

        /* ===== 搜尋區域 ===== */
        .search-area {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f3f8;
            border-radius: 40px;
            padding: 4px 4px 4px 18px;
            margin-bottom: 16px;
            border: 1px solid #e2e8f0;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .search-area:focus-within {
            border-color: #2d8c6f;
            box-shadow: 0 0 0 3px rgba(45, 140, 111, 0.15);
            background: #ffffff;
        }

        .search-area .search-icon {
            color: #8899aa;
            font-size: 18px;
            line-height: 1;
            user-select: none;
            flex-shrink: 0;
        }

        .search-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 16px;
            outline: none;
            color: #1e2a3a;
            min-width: 0;
        }
        .search-area input::placeholder {
            color: #aab8c9;
            font-weight: 400;
        }

        .search-area .search-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .search-area .btn-search,
        .search-area .btn-clear {
            border: none;
            background: transparent;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .search-area .btn-search {
            background: #2d8c6f;
            color: #fff;
            box-shadow: 0 2px 8px rgba(45, 140, 111, 0.2);
        }
        .search-area .btn-search:hover {
            background: #237a5f;
        }
        .search-area .btn-search:active {
            transform: scale(0.95);
        }

        .search-area .btn-clear {
            color: #8899aa;
            padding: 8px 10px;
        }
        .search-area .btn-clear:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #4a5a6a;
        }
        .search-area .btn-clear:active {
            transform: scale(0.95);
        }

        /* ===== 搜尋結果計數 ===== */
        .search-stats {
            font-size: 13px;
            color: #8899aa;
            margin: -8px 0 10px 4px;
            padding-left: 4px;
            min-height: 20px;
            transition: opacity 0.2s;
        }
        .search-stats strong {
            color: #2d8c6f;
            font-weight: 700;
        }
        .search-stats .highlight {
            color: #2d8c6f;
        }

        /* ===== 分類標籤 ===== */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eef2f7;
        }

        .category-tab {
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            background: #f0f3f8;
            color: #4a5a6a;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .category-tab:hover {
            background: #e6ecf5;
        }
        .category-tab.active {
            background: #2d8c6f;
            color: #fff;
            border-color: #2d8c6f;
            box-shadow: 0 2px 10px rgba(45, 140, 111, 0.25);
        }
        .category-tab .count-badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 20px;
            padding: 0 8px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 4px;
            color: inherit;
        }
        .category-tab.active .count-badge {
            background: rgba(255, 255, 255, 0.25);
        }
        .category-tab.hidden-tab {
            display: none;
        }

        /* ===== 品項列表 ===== */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 4px;
            margin-bottom: 20px;
            min-height: 120px;
        }

        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 12px;
            background: #fafcfe;
            border: 1px solid #edf2f7;
            transition: background 0.15s, border-color 0.15s, opacity 0.25s;
            cursor: default;
        }
        .item-row:hover {
            background: #f4f8ff;
            border-color: #d5e0ec;
        }

        .item-row .item-name {
            font-size: 16px;
            font-weight: 500;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .item-row .item-name .category-label {
            font-size: 11px;
            font-weight: 400;
            background: #eef2f7;
            color: #6a7a8a;
            padding: 0 10px;
            border-radius: 20px;
            line-height: 20px;
        }
        .item-row .item-name .match-highlight {
            background: #fde68a;
            padding: 0 2px;
            border-radius: 3px;
            font-weight: 600;
        }

        .item-row .item-prices {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #1e2a3a;
            flex-shrink: 0;
        }
        .item-row .item-prices .price-tag {
            background: #eef2f7;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #2d4a5a;
        }
        .item-row .item-prices .price-tag.m-price {
            color: #2d8c6f;
        }
        .item-row .item-prices .price-tag.l-price {
            color: #c07a3a;
        }

        .item-row.hidden-item {
            display: none;
        }

        /* ===== 無結果提示 ===== */
        .no-result {
            text-align: center;
            padding: 40px 16px 30px;
            color: #8899aa;
            font-size: 15px;
            display: none;
        }
        .no-result.show {
            display: block;
        }
        .no-result .icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }
        .no-result .sub {
            font-size: 13px;
            color: #aab8c9;
            margin-top: 4px;
        }

        /* ===== 底部操作按鈕 ===== */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-top: 16px;
            border-top: 1px solid #eef2f7;
            margin-top: 4px;
        }

        .actions .btn-action {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #d5e0ec;
            background: #ffffff;
            font-size: 14px;
            font-weight: 500;
            color: #4a5a6a;
            cursor: pointer;
            transition: all 0.15s;
            flex: 0 1 auto;
        }
        .actions .btn-action:hover {
            background: #f0f3f8;
            border-color: #b0c4d8;
        }
        .actions .btn-action.primary {
            background: #2d8c6f;
            border-color: #2d8c6f;
            color: #fff;
        }
        .actions .btn-action.primary:hover {
            background: #237a5f;
            border-color: #237a5f;
        }
        .actions .btn-action.outline {
            background: transparent;
            border-color: #d5e0ec;
        }
        .actions .btn-action.outline:hover {
            background: #f0f3f8;
        }

        /* ===== 響應式 ===== */
        @media (max-width: 480px) {
            body {
                padding: 8px 6px 20px;
            }
            .container {
                padding: 16px 12px 20px;
                border-radius: 16px;
            }
            .header h1 {
                font-size: 19px;
            }
            .search-area {
                padding: 2px 2px 2px 14px;
                border-radius: 30px;
            }
            .search-area input {
                font-size: 15px;
                padding: 10px 0;
            }
            .search-area .btn-search {
                padding: 6px 12px;
                font-size: 14px;
            }
            .search-area .btn-clear {
                padding: 6px 8px;
                font-size: 14px;
            }
            .item-row {
                padding: 10px 12px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .item-row .item-name {
                font-size: 15px;
            }
            .item-row .item-prices {
                font-size: 14px;
                gap: 6px;
            }
            .item-row .item-prices .price-tag {
                font-size: 12px;
                padding: 1px 8px;
            }
            .category-tab {
                font-size: 13px;
                padding: 5px 14px;
            }
            .actions .btn-action {
                font-size: 13px;
                padding: 6px 12px;
            }
        }

        @media (max-width: 380px) {
            .search-area {
                flex-wrap: wrap;
                background: transparent;
                border: none;
                padding: 0;
                gap: 6px;
            }
            .search-area:focus-within {
                box-shadow: none;
                background: transparent;
            }
            .search-area input {
                background: #f0f3f8;
                border-radius: 30px;
                padding: 10px 16px;
                border: 1px solid #e2e8f0;
                flex: 1 1 100%;
            }
            .search-area input:focus {
                background: #ffffff;
                border-color: #2d8c6f;
                box-shadow: 0 0 0 3px rgba(45, 140, 111, 0.12);
            }
            .search-area .search-icon {
                display: none;
            }
            .search-area .search-actions {
                width: 100%;
                justify-content: flex-end;
            }
            .search-area .btn-search {
                flex: 1;
                text-align: center;
            }
            .search-area .btn-clear {
                flex: 0 1 auto;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- ===== 標題列 ===== -->
        <div class="header">
            <h1>
                📋 品項列表
                <small id="totalCountLabel"></small>
            </h1>
            <button class="btn-add" id="btnAdd">＋ 新增</button>
        </div>

        <!-- ===== 搜尋區域 ===== -->
        <div class="search-area" id="searchArea">
            <span class="search-icon">🔍</span>
            <input
            type="text"
            id="searchInput"
            placeholder="搜尋品項名稱…"
            autocomplete="off"
            aria-label="搜尋品項"
            />
            <div class="search-actions">
                <button class="btn-search" id="searchBtn">搜尋</button>
                <button class="btn-clear" id="clearBtn" title="清除搜尋">✕</button>
            </div>
        </div>

        <!-- ===== 搜尋統計 ===== -->
        <div class="search-stats" id="searchStats"></div>

        <!-- ===== 分類標籤 ===== -->
        <div class="categories" id="categoryContainer">
            <!-- 由 JS 動態產生 -->
        </div>

        <!-- ===== 品項列表 ===== -->
        <div class="item-list" id="itemList">
            <!-- 由 JS 動態產生 -->
        </div>

        <!-- ===== 無結果 ===== -->
        <div class="no-result" id="noResult">
            <span class="icon">🔎</span>
            沒有找到符合的品項
            <div class="sub">試試其他關鍵字，或清除搜尋條件</div>
        </div>

        <!-- ===== 底部操作 ===== -->
        <div class="actions">
            <button class="btn-action primary">💾 儲存品項</button>
            <button class="btn-action outline">↻ 重置品項</button>
            <button class="btn-action outline">💾 儲存全部</button>
            <button class="btn-action outline">📤 匯出 JSON</button>
            <button class="btn-action outline">📥 匯入 JSON</button>
        </div>

    </div>

    <script>
        // ================================================================
        //  1. 資料（模擬品項）
        // ================================================================
        const DATA = [{
            category: '常用類',
            items: [
                { name: '特級綠茶', prices: { M: 25, L: 30 } },
                { name: '特級奶綠', prices: { M: 40, L: 50 } },
                { name: '珍珠奶茶', prices: { M: 45, L: 55 } },
                { name: '布丁奶茶', prices: { M: 50, L: 60 } },
                { name: '蜜茶', prices: { M: 30, L: 40 } },
                { name: '隱藏版', prices: { M: 50, L: 65 } },
                { name: '@綠+紅', prices: { M: 40, L: 50 } },
            ]
        }, {
            category: '特調·果醋',
            items: [
                { name: '烏龍菁茶', prices: { M: 35, L: 45 } },
                { name: '冬瓜菁茶', prices: { M: 30, L: 40 } },
                { name: '頂級可可', prices: { M: 55, L: 70 } },
                { name: '金桔檸檬', prices: { M: 40, L: 55 } },
                { name: '蜜桃凍紅茶', prices: { M: 45, L: 60 } },
                { name: '優多茶', prices: { M: 35, L: 45 } },
                { name: '冬瓜', prices: { M: 25, L: 35 } },
                { name: '濃情巧克', prices: { M: 60, L: 75 } },
                { name: '柳橙緣', prices: { M: 40, L: 55 } },
            ]
        }, {
            category: '鮮奶·加料',
            items: [
                { name: '鮮奶紅茶', prices: { M: 50, L: 65 } },
                { name: '鮮奶綠茶', prices: { M: 50, L: 65 } },
                { name: '黑糖珍珠鮮奶', prices: { M: 60, L: 75 } },
                { name: '芋頭鮮奶', prices: { M: 55, L: 70 } },
                { name: '紅豆鮮奶', prices: { M: 50, L: 65 } },
                { name: '布丁鮮奶', prices: { M: 55, L: 70 } },
                { name: '仙草凍鮮奶', prices: { M: 50, L: 65 } },
            ]
        }, {
            category: '隱藏版',
            items: [
                { name: '綠豆沙牛奶', prices: { M: 45, L: 60 } },
                { name: '椰奶西米露', prices: { M: 50, L: 65 } },
                { name: '薑汁奶茶', prices: { M: 45, L: 60 } },
                { name: '桂花釀茶', prices: { M: 40, L: 55 } },
            ]
        }];

        // ================================================================
        //  2. 狀態
        // ================================================================
        let currentCategory = '全部'; // '全部' 或具體分類名稱
        let searchKeyword = '';
        let allItems = []; // { category, name, prices, id }

        // 為每個品項生成唯一 id
        let idCounter = 0;
        DATA.forEach(cat => {
            cat.items.forEach(item => {
                allItems.push({
                    id: ++idCounter,
                    category: cat.category,
                    name: item.name,
                    prices: item.prices,
                });
            });
        });

        // ================================================================
        //  3. DOM 參考
        // ================================================================
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const itemListEl = $('#itemList');
        const categoryContainer = $('#categoryContainer');
        const searchInput = $('#searchInput');
        const searchBtn = $('#searchBtn');
        const clearBtn = $('#clearBtn');
        const searchStats = $('#searchStats');
        const noResult = $('#noResult');
        const totalCountLabel = $('#totalCountLabel');

        // ================================================================
        //  4. 渲染函式
        // ================================================================

        /** 取得當前過濾後的品項 */
        function getFilteredItems() {
            let result = allItems;

            // 分類過濾
            if (currentCategory !== '全部') {
                result = result.filter(item => item.category === currentCategory);
            }

            // 關鍵字過濾（名稱包含，不區分大小寫）
            if (searchKeyword.trim() !== '') {
                const kw = searchKeyword.trim().toLowerCase();
                result = result.filter(item => item.name.toLowerCase().includes(kw));
            }

            return result;
        }

        /** 渲染分類標籤 */
        function renderCategories() {
            const categories = ['全部', ...new Set(allItems.map(item => item.category))];
            const filtered = getFilteredItems();
            const filteredCategorySet = new Set(filtered.map(item => item.category));

            let html = '';
            categories.forEach(cat => {
                const count = allItems.filter(item => {
                    if (cat === '全部') return true;
                    return item.category === cat;
                }).length;

                // 如果該分類在目前搜尋下沒有品項，且不是「全部」，則隱藏該標籤
                const hasMatch = (cat === '全部') ?
                    filtered.length > 0 :
                    filteredCategorySet.has(cat);

                const active = (cat === currentCategory) ? 'active' : '';
                const hidden = (!hasMatch && cat !== '全部' && searchKeyword.trim() !== '') ? 'hidden-tab' : '';

                html += `
                        <div class="category-tab ${active} ${hidden}" data-category="${cat}">
                            ${cat}
                            <span class="count-badge">${count}</span>
                        </div>
                    `;
            });

            categoryContainer.innerHTML = html;

            // 綁定點擊事件
            categoryContainer.querySelectorAll('.category-tab').forEach(el => {
                el.addEventListener('click', function() {
                    const cat = this.dataset.category;
                    currentCategory = cat;
                    // 切換標籤時，若搜尋框有關鍵字，保留搜尋
                    applyFilterAndRender();
                });
            });
        }

        /** 渲染品項列表 */
        function renderItems() {
            const filtered = getFilteredItems();
            const kw = searchKeyword.trim().toLowerCase();

            // 更新總數標籤
            totalCountLabel.textContent = `共 ${allItems.length} 項`;

            // 更新統計
            if (searchKeyword.trim() !== '') {
                searchStats.innerHTML = `
                        🔎 找到 <strong>${filtered.length}</strong> 項
                        ${filtered.length > 0 ? `（共 ${allItems.length} 項）` : ''}
                    `;
            } else {
                searchStats.innerHTML = '';
            }

            // 無結果
            if (filtered.length === 0) {
                noResult.classList.add('show');
            } else {
                noResult.classList.remove('show');
            }

            // 構建列表
            let html = '';
            filtered.forEach(item => {
                // 高亮關鍵字
                let displayName = item.name;
                if (kw !== '') {
                    const idx = displayName.toLowerCase().indexOf(kw);
                    if (idx !== -1) {
                        const before = displayName.slice(0, idx);
                        const match = displayName.slice(idx, idx + kw.length);
                        const after = displayName.slice(idx + kw.length);
                        displayName = `${before}<span class="match-highlight">${match}</span>${after}`;
                    }
                }

                const mPrice = item.prices.M !== undefined && item.prices.M !== null ? `$${item.prices.M}` : '—';
                const lPrice = item.prices.L !== undefined && item.prices.L !== null ? `$${item.prices.L}` : '—';

                html += `
                        <div class="item-row" data-id="${item.id}">
                            <div class="item-name">
                                ${displayName}
                                <span class="category-label">${item.category}</span>
                            </div>
                            <div class="item-prices">
                                <span class="price-tag m-price">M ${mPrice}</span>
                                <span class="price-tag l-price">L ${lPrice}</span>
                            </div>
                        </div>
                    `;
            });

            itemListEl.innerHTML = html;
        }

        /** 統一的過濾 + 渲染 */
        function applyFilterAndRender() {
            renderCategories();
            renderItems();
            // 滾動到列表頂部，方便查看結果
            itemListEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ================================================================
        //  5. 搜尋事件
        // ================================================================

        /** 執行搜尋（讀取輸入框的值） */
        function doSearch() {
            const val = searchInput.value;
            searchKeyword = val;
            // 如果搜尋關鍵字為空，自動將分類切換為「全部」
            if (searchKeyword.trim() === '') {
                currentCategory = '全部';
            }
            applyFilterAndRender();
        }

        /** 清除搜尋 */
        function clearSearch() {
            searchInput.value = '';
            searchKeyword = '';
            currentCategory = '全部';
            applyFilterAndRender();
            searchInput.focus();
        }

        // ================================================================
        //  6. 事件綁定
        // ================================================================

        // 搜尋按鈕
        searchBtn.addEventListener('click', doSearch);

        // 清除按鈕
        clearBtn.addEventListener('click', clearSearch);

        // 輸入框 Enter 觸發搜尋
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });

        // 輸入框即時搜尋（可選：若希望輸入即過濾，取消註解下面區塊）
        // 但為了符合「搜尋鈕」的明確操作，我們保留按鈕觸發為主。
        // 同時支援 input 即時過濾（使用者體驗更佳），但以按鈕為主要觸發。
        // 若想啟用即時過濾，可取消註解：
        /*
        searchInput.addEventListener('input', function() {
            // 若輸入框為空，自動清除搜尋狀態
            if (this.value.trim() === '') {
                clearSearch();
            } else {
                // 使用 debounce 避免過度渲染
                clearTimeout(this._timer);
                this._timer = setTimeout(() => {
                    doSearch();
                }, 250);
            }
        });
        */

        // 簡化版：輸入時即時過濾（延遲 300ms）
        let searchTimer = null;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            const val = this.value;
            if (val.trim() === '') {
                // 空值時清除搜尋
                clearSearch();
                return;
            }
            searchTimer = setTimeout(() => {
                searchKeyword = val;
                // 若目前分類下沒有匹配，自動切換到「全部」？
                // 但保留使用者選擇的分類，只在該分類下搜尋
                applyFilterAndRender();
            }, 300);
        });

        // 點擊外部區域可聚焦搜尋框（方便操作）
        document.addEventListener('click', function(e) {
            const area = document.getElementById('searchArea');
            if (area && !area.contains(e.target) && e.target.tagName !== 'INPUT') {
                // 不強制聚焦，避免干擾
            }
        });

        // ================================================================
        //  7. 初始化
        // ================================================================

        function init() {
            currentCategory = '全部';
            searchKeyword = '';
            searchInput.value = '';
            applyFilterAndRender();
        }

        init();

        // 新增按鈕（模擬）
        document.getElementById('btnAdd').addEventListener('click', function() {
            alert('📌 新增品項功能\n（此為示範，可串接後端表單）');
        });

        // 底部按鈕（模擬）
        document.querySelectorAll('.actions .btn-action').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const text = this.textContent.trim();
                if (text.includes('儲存') || text.includes('匯') || text.includes('重置')) {
                    alert(`⚡ 功能：${text}\n（此為前端示範，實際操作需串接 API）`);
                }
            });
        });

        console.log('✅ 品項管理頁面已載入，搜尋功能就緒！');
        console.log(`📦 共 ${allItems.length} 個品項`);
    </script>
