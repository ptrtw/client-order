<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>員工快速點餐 - 清心福全左營榮總店</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 您的原版 CSS 樣式已保留，確保視覺體驗一致 */
        :root { --brand-color: #06C755; --bg-color: #f1f5f9; --text-main: #1e293b; --header-height: 46px; --tab-height: 40px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); height: 100%; overflow: hidden; user-select: none; }
        .app-header { background: var(--brand-color); color: white; padding: 0 16px; display: flex; justify-content: space-between; align-items: center; height: var(--header-height); }
        .tab-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px 6px; background: #e2e8f0; height: var(--tab-height); }
        .tab-btn { padding: 5px 4px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; background: #f1f5f9; color: #64748b; }
        .tab-btn.active { background: #ffffff; color: #06C755; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .pos-grid { display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(11, 1fr); gap: 4px; padding: 4px; background: #e2e8f0; height: calc(100% - var(--header-height) - var(--tab-height)); }
        .pos-item { background: #ffffff; border-radius: 6px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 13px; font-weight: 700; color: var(--text-main); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: flex-end; z-index: 200; }
        .modal-overlay.open { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; padding: 16px; border-radius: 20px 20px 0 0; max-height: 85vh; overflow-y: auto; }
        #cart-panel { position: fixed; bottom: 84px; right: 16px; width: 360px; max-width: calc(100vw - 32px); background: #ffffff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); padding: 16px; display: none; flex-direction: column; z-index: 100; }
        #cart-panel.open { display: flex; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>🧋 員工快速點餐</h1>
        <button id="cart-header-btn" onclick="toggleCart()">🛒 <span id="cartBadge" class="hidden">0</span></button>
    </header>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(0)">📋 常用類</button>
        <button class="tab-btn" onclick="switchTab(1)">🍹 特調·果醋</button>
        <button class="tab-btn" onclick="switchTab(2)">🥛 鮮奶·加料</button>
    </div>

    <div class="pos-grid" id="posGrid"></div>

    <script>
        // 核心設定
        const LIFF_ID = "2010718024-5LLzGr1V";
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxxmhUzz5GIVwmi-CYd0jbZOIAAMoTsVztXzMvBYBRz5i8jrLptkw8eAR4vuawDKjgF/exec";

        let storeData = { products: {}, employeeView: { pages: [[], [], []] }, globalSettings: { ice: [], sugar: [], toppings: {} } };

        async function loadCloudData() {
            try {
                const res = await fetch(GAS_API_URL);
                storeData = await res.json();
                initGrid();
                renderGrid(0);
            } catch (e) { alert("雲端資料讀取失敗，請確認網路"); }
        }

        function initGrid() {
            for(let i=0; i<3; i++) {
                let page = storeData.employeeView.pages[i] || [];
                while(page.length < 60) page.push(null);
                storeData.employeeView.pages[i] = page;
            }
        }

        function renderGrid(pageIndex) {
            const grid = document.getElementById('posGrid');
            grid.innerHTML = '';
            const layout = storeData.employeeView.pages[pageIndex];
            for (let i = 0; i < 66; i++) {
                const cell = document.createElement('div');
                cell.className = 'pos-item';
                if (i >= 60) { cell.classList.add('empty-row'); }
                else {
                    const itemId = layout[i];
                    if (itemId && storeData.products[itemId]) {
                        cell.textContent = storeData.products[itemId].name;
                        cell.onclick = () => alert("即將整合點餐彈窗...");
                    } else {
                        cell.style.background = 'transparent'; cell.style.boxShadow = 'none';
                    }
                }
                grid.appendChild(cell);
            }
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
            renderGrid(index);
        }

        function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }

        loadCloudData();
    </script>
</body>
</html>
