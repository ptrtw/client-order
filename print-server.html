<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清心福全 - 全自動出單中心 (Pro版)</title>
<style>
    body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; margin: 0; }
    .card { background: #1e1e1e; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .status-badge { display: inline-block; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
    .status-online { background: #06C755; color: #fff; }
    .log-box { background: #000; color: #0f0; text-align: left; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; height: 250px; overflow-y: auto; margin-top: 20px; border: 1px solid #333; }
    .btn { background: #06C755; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
    .btn:active { background: #05a044; }
</style>
</head>
<body>

<div class="card">
    <h2>🚀 Pro 級靜默出單監控中</h2>
    <div id="status" class="status-badge status-online">🟢 系統運作中（自動攔截新單）</div>
    <p style="color: #aaa; font-size: 0.95rem;">請讓此畫面常駐於平板。收到訂單將自動直連印表機，不需手動確認。</p>
    
    <button class="btn" onclick="testPrint()">⚡ 測試一鍵秒印</button>

    <div class="log-box" id="log-container">
        [系統初始化] 準備就緒，監控雲端訂單中...<br>
    </div>
</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwxTS2OpGknXd9MjMjrkINktu3nY6PKEv8cfjdwwTyZQPKfVVPVf0N7BIfJtS1bvVNRuQ/exec";
    
    function addLog(msg) {
        const box = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString();
        box.innerHTML += `[${time}] ${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    // 模擬測試訂單
    function testPrint() {
        addLog("▶️ 觸發測試列印...");
        let mockOrder = {
            phone: "0912345678",
            method: "外送",
            address: "高雄市左營區榮總路123號",
            note: "送到警衛室，謝謝",
            finalTotal: 175,
            cartItems: [
                { item: { name: "珍珠奶茶" }, size: "L", qty: 2, price: 110, ice: "少冰", sugar: "微糖", toppings: ["珍珠"] },
                { item: { name: "烏龍綠茶" }, size: "L", qty: 1, price: 65, ice: "去冰", sugar: "無糖", toppings: [] }
            ]
        };
        sendToRawBT(mockOrder);
    }

    // 每 3 秒問一次 Google 有沒有新訂單
    setInterval(checkForNewOrders, 3000);

    function checkForNewOrders() {
        fetch(GAS_API_URL + "?action=getPendingOrders")
        .then(r => r.json())
        .then(data => {
            if (data && data.hasNewOrder) {
                addLog(`🎉 收到新訂單！總計：$${data.order.finalTotal}，秒速出單中...`);
                sendToRawBT(data.order);
                markOrderAsPrinted(data.order.orderId);
            }
        })
        .catch(err => {}); // 網路波動不干擾畫面
    }

    // 終極解法：透過 WebSocket 把純文字直送 RawBT，呼叫出單機原生大字體
    function sendToRawBT(order) {
        // 組裝純文字訂單，使用印表機原生字體排版
        let receiptText = "\n";
        receiptText += "==============================\n";
        receiptText += "      ★ 清心福全左營榮總店 ★      \n";
        receiptText += "        【 網路自動接單 】        \n";
        receiptText += "==============================\n";
        receiptText += `📞 電話: ${order.phone}\n`;
        receiptText += `🛵 方式: ${order.method}\n`;
        if (order.address) receiptText += `📍 地址: ${order.address}\n`;
        if (order.note) receiptText += `📝 備註: ${order.note}\n`;
        receiptText += "------------------------------\n";
        
        // 迴圈印出品項
        order.cartItems.forEach(i => {
            receiptText += `[${i.item.name}] (${i.size}) x ${i.qty}\n`;
            receiptText += `   $${i.price} | ${i.ice}/${i.sugar}`;
            if(i.toppings && i.toppings.length > 0) {
                receiptText += `+${i.toppings.join()}`;
            }
            receiptText += "\n\n"; // 品項之間空行
        });

        receiptText += "------------------------------\n";
        receiptText += `💰 總計金額: $${order.finalTotal}\n`;
        receiptText += "==============================\n";
        receiptText += "          --- 謝謝光臨 ---        \n";
        receiptText += "\n\n\n\n\n"; // 多送出幾個換行把紙推出來方便撕

        // 建立 WebSocket 連線，瞬間送出
        try {
            let ws = new WebSocket("ws://127.0.0.1:4022/");
            
            ws.onopen = function() {
                ws.send(receiptText);
                ws.close();
                addLog("✅ 成功！指令已無聲送達出單機。");
            };
            
            ws.onerror = function() {
                addLog("❌ 無法連線出單機！請檢查 RawBT 裡的 WebSocket 是否有打勾開啟。");
            };
        } catch(e) {
            addLog("❌ 系統發送失敗：" + e.message);
        }
    }

    // 通知雲端已列印
    function markOrderAsPrinted(orderId) {
        fetch(GAS_API_URL + "?action=markPrinted&id=" + orderId)
        .then(r => r.json())
        .then(res => {
            addLog("☁️ 雲端狀態已同步為：已列印");
        });
    }
</script>

</body>
</html>
