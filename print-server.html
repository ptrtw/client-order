<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清心福全 - 自動出單監控中心</title>
<style>
    body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; margin: 0; }
    .card { background: #1e1e1e; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .status-badge { display: inline-block; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
    .status-online { background: #06C755; color: #fff; }
    .log-box { background: #000; color: #0f0; text-align: left; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; height: 250px; overflow-y: auto; margin-top: 20px; border: 1px solid #333; }
    .btn { background: #06C755; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }

    #print-area { display: none; }

    /* ====== 精準省紙排版 ====== */
    @media print {
        @page {
            margin: 0 !important; 
            size: 80mm auto;      
        }
        /* 強制高度為自動，不補滿 A4 */
        html, body { margin: 0; padding: 0; height: auto !important; background: #fff; }
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area {
            display: block !important;
            position: absolute;
            left: 0;
            top: 0;
            width: 76mm; 
            padding: 2mm;
            font-family: sans-serif; 
            color: #000 !important;
            line-height: 1.4;
        }
        .line { border-bottom: 2px dashed #000; margin: 8px 0; }
    }
</style>
</head>
<body>

<div class="card">
    <h2>🖨️ 自動出單監控中</h2>
    <div id="status" class="status-badge status-online">🟢 系統監控中（每 3 秒檢查一次）</div>
    <p style="color: #aaa; font-size: 0.95rem;">請讓此畫面常駐於平板。收到新訂單將自動觸發列印。</p>
    
    <button class="btn" onclick="testPrint()">🧪 測試手動列印</button>

    <div class="log-box" id="log-container">
        [系統初始化] 準備就緒，監控雲端訂單中...<br>
    </div>
</div>

<div id="print-area"></div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwxTS2OpGknXd9MjMjrkINktu3nY6PKEv8cfjdwwTyZQPKfVVPVf0N7BIfJtS1bvVNRuQ/exec";
    
    function addLog(msg) {
        const box = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString();
        box.innerHTML += `[${time}] ${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    function testPrint() {
        addLog("▶️ 觸發測試列印...");
        let mockOrder = {
            phone: "0912345678",
            method: "外送",
            address: "高雄市左營區榮總路123號",
            note: "送到警衛室，謝謝",
            finalTotal: 175,
            cartItems: [
                { item: { name: "珍珠奶茶" }, size: "L", qty: 2, price: 110, ice: "少冰", sugar: "微糖", toppings: ["珍珠"] },
                { item: { name: "烏龍綠茶" }, size: "L", qty: 1, price: 65, ice: "去冰", sugar: "無糖", toppings: [] }
            ]
        };
        triggerAutoPrint(mockOrder);
    }

    setInterval(checkForNewOrders, 3000);

    function checkForNewOrders() {
        fetch(GAS_API_URL + "?action=getPendingOrders")
        .then(r => r.json())
        .then(data => {
            if (data && data.hasNewOrder) {
                addLog(`🎉 收到新訂單！總計：$${data.order.finalTotal}`);
                triggerAutoPrint(data.order);
                markOrderAsPrinted(data.order.orderId);
            }
        })
        .catch(err => {});
    }

    function triggerAutoPrint(order) {
        // 字體縮小回合理的大字範圍，不多留白
        let itemsHtml = order.cartItems.map(i => `
            <div style="font-size: 20px; font-weight: 900; margin-top: 8px;">${i.item.name}(${i.size}) x${i.qty}</div>
            <div style="font-size: 16px; font-weight: 900; margin-bottom: 4px;"> └ ${i.ice}/${i.sugar}${i.toppings.length ? '/加:'+i.toppings.join() : ''}  $${i.price}</div>
        `).join('');

        // 移除了最後的 <br> 換行，避免浪費紙
        document.getElementById('print-area').innerHTML = `
            <div style="text-align: center; font-size: 24px; font-weight: 900;">★ 清心福全左營榮總店 ★</div>
            <div style="text-align: center; font-size: 16px; margin-bottom: 5px;">【 網路新訂單 】</div>
            <div class="line"></div>
            <div style="font-size: 18px; font-weight: 900;">[電話] ${order.phone}</div>
            <div style="font-size: 18px; font-weight: 900;">[方式] ${order.method}</div>
            ${order.address ? `<div style="font-size: 18px; font-weight: 900;">[地址] ${order.address}</div>` : ''}
            ${order.note ? `<div style="font-size: 18px; font-weight: 900;">[備註] ${order.note}</div>` : ''}
            <div class="line"></div>
            ${itemsHtml}
            <div class="line"></div>
            <div style="text-align: right; font-size: 24px; font-weight: 900;">總計: $${order.finalTotal}</div>
            <div style="text-align: center; font-size: 14px; margin-top: 10px;">--- 謝謝光臨 ---</div>
        `;

        setTimeout(() => {
            window.print();
            addLog("✅ 已送出列印表單");
        }, 300);
    }

    function markOrderAsPrinted(orderId) {
        fetch(GAS_API_URL + "?action=markPrinted&id=" + orderId)
        .then(r => r.json())
        .then(res => {
            addLog("☁️ 雲端狀態已更新");
        });
    }
</script>

</body>
</html>
