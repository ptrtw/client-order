<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清心福全自動出單監控中心</title>
<style>
    body { font-family: sans-serif; background: #f0f2f5; color: #333; text-align: center; padding: 30px; margin: 0; }
    .card { background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .status-badge { display: inline-block; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; }
    .status-online { background: #e8f5e9; color: #06C755; }
    .log-box { background: #1e293b; color: #38bdf8; text-align: left; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; height: 180px; overflow-y: auto; margin-top: 20px; }
    .btn { background: #06C755; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }

    /* 預設隱藏，只有在列印時才會浮現出來給熱感應機印 */
    #print-area { display: none; }

    @media print {
        body * { visibility: hidden; }
        #print-area, #print-area * { visibility: visible; }
        #print-area {
            display: block !important;
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            color: #000;
            padding: 5px;
        }
    }
</style>
</head>
<body>

<div class="card">
    <h2>🖨️ 平板自動出單監控中</h2>
    <div id="status" class="status-badge status-online">🟢 系統監控中（每 3 秒檢查一次）</div>
    <p style="color: #666; font-size: 0.9rem;">請讓此分頁保持開啟，切勿關閉瀏覽器。<br>當有新訂單進來時，出單機將自動列印。</p>
    
    <button class="btn" onclick="testPrint()">🧪 測試手動列印</button>

    <div class="log-box" id="log-container">
        [系統初始化] 正在建立與雲端後台的連線...<br>
    </div>
</div>

<!-- 專門用來給熱感應機列印的隱藏單據容器 -->
<div id="print-area"></div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwxTS2OpGknXd9MjMjrkINktu3nY6PKEv8cfjdwwTyZQPKfVVPVf0N7BIfJtS1bvVNRuQ/exec";
    
    function addLog(msg) {
        const box = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString();
        box.innerHTML += `[${time}] ${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    function testPrint() {
        addLog("正在發送測試列印指令...");
        let mockOrder = {
            phone: "0912345678",
            method: "自取",
            address: "",
            note: "少冰微糖",
            finalTotal: 110,
            cartItems: [
                { item: { name: "珍珠奶茶" }, size: "L", qty: 2, price: 110, ice: "少冰", sugar: "微糖", toppings: ["珍珠"] }
            ]
        };
        triggerAutoPrint(mockOrder);
    }

    setInterval(checkForNewOrders, 3000);

    function checkForNewOrders() {
        fetch(GAS_API_URL + "?action=getPendingOrders")
        .then(r => r.json())
        .then(data => {
            if (data && data.hasNewOrder) {
                addLog(`🎉 發現新訂單！金額：$${data.order.finalTotal}，正在觸發自動列印...`);
                triggerAutoPrint(data.order);
                markOrderAsPrinted(data.order.orderId);
            }
        })
        .catch(err => {});
    }

    function triggerAutoPrint(order) {
        let itemsHtml = order.cartItems.map(i => `
            <div style="font-size: 15px; font-weight: bold; margin-top: 6px;">${i.item.name} (${i.size}) x ${i.qty}  $${i.price}</div>
            <div style="font-size: 13px; font-weight: bold; color: #000; margin-bottom: 4px;">　-> ${i.ice} / ${i.sugar} ${i.toppings.length ? '/ 加:'+i.toppings.join() : ''}</div>
        `).join('');

        // 將訂單內容塞入隱藏的列印區塊
        document.getElementById('print-area').innerHTML = `
            <div style="text-align: center; font-size: 18px; font-weight: 900;">★ 清心福全左營榮總店 ★</div>
            <div style="text-align: center; font-size: 13px;">【 網路新訂單 】</div>
            <div style="border-bottom: 2px dashed #000; margin: 8px 0;"></div>
            <div style="font-size: 14px;">📞 電話：${order.phone}</div>
            <div style="font-size: 14px;">🛵 方式：${order.method}</div>
            ${order.address ? `<div style="font-size: 14px;">📍 地址：${order.address}</div>` : ''}
            ${order.note ? `<div style="font-size: 14px; color: #000;">📝 備註：${order.note}</div>` : ''}
            <div style="border-bottom: 2px dashed #000; margin: 8px 0;"></div>
            ${itemsHtml}
            <div style="border-bottom: 2px dashed #000; margin: 8px 0;"></div>
            <div style="text-align: right; font-size: 18px; font-weight: 900;">總計: $${order.finalTotal}</div>
            <div style="text-align: center; font-size: 12px; margin-top: 15px;">--- 謝謝光臨 ---</div>
        `;

        // 直接呼叫瀏覽器列印當前頁面（CSS 會自動只抓取 print-area 裡面的內容）
        setTimeout(() => {
            window.print();
            addLog("✅ 列印指令已送出！");
        }, 300);
    }

    function markOrderAsPrinted(orderId) {
        fetch(GAS_API_URL + "?action=markPrinted&id=" + orderId)
        .then(r => r.json())
        .then(res => {
            addLog("雲端狀態已更新為：已列印");
        });
    }
</script>

</body>
</html>
