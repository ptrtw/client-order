<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清心福全 - 背景自動出單中心</title>
<style>
    body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; margin: 0; }
    .card { background: #1e1e1e; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .status-badge { display: inline-block; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; }
    .status-online { background: #06C755; color: #fff; }
    .log-box { background: #000; color: #0f0; text-align: left; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; height: 250px; overflow-y: auto; margin-top: 20px; border: 1px solid #333; }
    .btn { background: #06C755; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
</style>
</head>
<body>

<div class="card">
    <h2>🚀 背景自動秒印中</h2>
    <div id="status" class="status-badge status-online">🟢 系統監控中（每 3 秒檢查一次）</div>
    <p style="color: #aaa; font-size: 0.95rem;">此畫面可保持開啟。收到新訂單將透過通道直驅 RawBT，不跳預覽！</p>
    
    <button class="btn" onclick="testPrint()">⚡ 測試背景秒印</button>

    <div class="log-box" id="log-container">
        [系統初始化] 準備就緒，監控雲端訂單中...<br>
    </div>
</div>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwxTS2OpGknXd9MjMjrkINktu3nY6PKEv8cfjdwwTyZQPKfVVPVf0N7BIfJtS1bvVNRuQ/exec";
    
    function addLog(msg) {
        const box = document.getElementById('log-container');
        const time = new Date().toLocaleTimeString();
        box.innerHTML += `[${time}] ${msg}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    function testPrint() {
        addLog("▶️ 觸發測試背景列印...");
        let mockOrder = {
            orderId: "test_" + Date.now(),
            phone: "0912345678",
            method: "外送",
            address: "高雄市左營區榮總路123號",
            note: "送到警衛室，謝謝",
            finalTotal: 175,
            cartItems: [
                { item: { name: "珍珠奶茶" }, size: "L", qty: 2, price: 110, ice: "少冰", sugar: "微糖", toppings: ["珍珠"] },
                { item: { name: "烏龍綠茶" }, size: "L", qty: 1, price: 65, ice: "去冰", sugar: "無糖", toppings: [] }
            ]
        };
        sendToRawBTApp(mockOrder);
    }

    setInterval(checkForNewOrders, 3000);

    function checkForNewOrders() {
        fetch(GAS_API_URL + "?action=getPendingOrders")
        .then(r => r.json())
        .then(data => {
            if (data && data.hasNewOrder) {
                addLog(`🎉 收到新訂單！總計：$${data.order.finalTotal}，背景直印中...`);
                sendToRawBTApp(data.order);
                markOrderAsPrinted(data.order.orderId);
            }
        })
        .catch(err => {});
    }

    // 🌟 透過 Android 專屬通訊協定直接喚醒 RawBT App 背景列印
    function sendToRawBTApp(order) {
        let text = "\n";
        text += "==============================\n";
        text += "      ★ 清心福全左營榮總店 ★      \n";
        text += "        【 網路自動接單 】        \n";
        text += "==============================\n";
        text += `[電話] ${order.phone}\n`;
        text += `[方式] ${order.method}\n`;
        if (order.address) text += `[地址] ${order.address}\n`;
        if (order.note) text += `[備註] ${order.note}\n`;
        text += "------------------------------\n";
        
        order.cartItems.forEach(i => {
            text += `${i.item.name}(${i.size}) x${i.qty}\n`;
            text += ` └ ${i.ice}/${i.sugar}`;
            if(i.toppings && i.toppings.length > 0) text += `/加:${i.toppings.join()}`;
            text += `  $${i.price}\n\n`;
        });

        text += "------------------------------\n";
        text += `總計: $${order.finalTotal}\n`;
        text += "==============================\n";
        text += "         --- 謝謝光臨 ---         \n\n\n";

        // 將組合好的文字轉為 Base64 格式打包
        let encodedText = btoa(unescape(encodeURIComponent(text)));
        
        // 呼叫 RawBT 專屬的 intent 連結，不需透過瀏覽器列印預覽
        let rawbtUrl = "rawbt:base64," + encodedText;
        
        // 在背景偷偷切換或開啟通訊協定
        window.location.href = rawbtUrl;
        addLog("✅ 背景列印指令已拋給 RawBT！");
    }

    function markOrderAsPrinted(orderId) {
        fetch(GAS_API_URL + "?action=markPrinted&id=" + orderId)
        .then(r => r.json())
        .then(res => {
            addLog("☁️ 雲端狀態已同步");
        });
    }
</script>

</body>
</html>
